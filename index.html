{ word: "glasses", phonetic: "/ˈglæsɪz/", translation: "kính mắt", example: "He wears glasses.", exampleTrans: "Anh ấy đeo kính.", topic: "Quần áo", emoji: "👓" }
{ word: "ring", phonetic: "/rɪŋ/", translation: "chiếc nhẫn", example: "A gold ring.", exampleTrans: "Một chiếc nhẫn vàng.", topic: "Quần áo", emoji: "💍" }

{ word: "flower", phonetic: "/ˈflaʊər/", translation: "bông hoa", example: "This flower smells good.", exampleTrans: "Bông hoa này có mùi thơm.", topic: "Thiên nhiên", emoji: "🌻" }
{ word: "grass", phonetic: "/græs/", translation: "bãi cỏ", example: "Don't walk on the grass.", exampleTrans: "Đừng dẫm lên cỏ.", topic: "Thiên nhiên", emoji: "🌿" }
{ word: "cloud", phonetic: "/klaʊd/", translation: "đám mây", example: "Look at that cloud.", exampleTrans: "Nhìn đám mây kia kìa.", topic: "Thiên nhiên", emoji: "☁️" }
{ word: "rain", phonetic: "/reɪn/", translation: "cơn mưa", example: "It is going to rain.", exampleTrans: "Trời sắp mưa rồi.", topic: "Thiên nhiên", emoji: "🌧️" }
{ word: "snow", phonetic: "/snoʊ/", translation: "tuyết", example: "Kids love playing in the snow.", exampleTrans: "Trẻ em thích chơi dưới tuyết.", topic: "Thiên nhiên", emoji: "❄️" }

// Chủ đề 10: Đồ chơi (Toys)
{ word: "doll", phonetic: "/dɑːl/", translation: "búp bê", example: "She plays with her doll.", exampleTrans: "Cô bé chơi với búp bê.", topic: "Đồ chơi", emoji: "🎎" }
{ word: "ball", phonetic: "/bɔːl/", translation: "quả bóng", example: "Kick the ball.", exampleTrans: "Hãy đá quả bóng.", topic: "Đồ chơi", emoji: "⚽" }
{ word: "car", phonetic: "/kɑːr/", translation: "ô tô đồ chơi", example: "He has a toy car.", exampleTrans: "Cậu bé có một chiếc ô tô đồ chơi.", topic: "Đồ chơi", emoji: "🚗" }
{ word: "train", phonetic: "/treɪn/", translation: "tàu hỏa", example: "The train goes choo-choo.", exampleTrans: "Tàu hỏa chạy xình xịch.", topic: "Đồ chơi", emoji: "🚂" }
{ word: "kite", phonetic: "/kaɪt/", translation: "cái diều", example: "Let's fly a kite.", exampleTrans: "Cùng đi thả diều nào.", topic: "Đồ chơi", emoji: "🪁" }
{ word: "block", phonetic: "/blɑːk/", translation: "khối xếp hình", example: "Build with blocks.", exampleTrans: "Xếp hình bằng các khối gỗ.", topic: "Đồ chơi", emoji: "🧱" }
{ word: "bear", phonetic: "/ber/", translation: "gấu bông", example: "My teddy bear is soft.", exampleTrans: "Gấu bông của tôi rất mềm.", topic: "Đồ chơi", emoji: "🧸" }
{ word: "robot", phonetic: "/ˈroʊbɑːt/", translation: "người máy", example: "The robot can walk.", exampleTrans: "Người máy có thể đi lại.", topic: "Đồ chơi", emoji: "🤖" }
{ word: "puzzle", phonetic: "/ˈpʌzl/", translation: "trò ghép hình", example: "Solve the puzzle.", exampleTrans: "Hãy giải bức tranh ghép hình.", topic: "Đồ chơi", emoji: "🧩" }
{ word: "boat", phonetic: "/boʊt/", translation: "con thuyền", example: "The boat is on the water.", exampleTrans: "Con thuyền ở trên mặt nước.", topic: "Đồ chơi", emoji: "⛵" } 
        ];

        // Hàm tạo số ngẫu nhiên có hạt giống (seed) để giữ nguyên kết quả trong cùng 1 ngày
        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        function VocabularyApp() {
            const [dailyWords, setDailyWords] = useState([]);
            const [mode, setMode] = useState('daily');

            useEffect(() => {
                generateWords('daily');
            }, []);

            const topics = [...new Set(VOCABULARY_DB.map(w => w.topic))];

            const getWordsByTopicShuffled = (topic, seed) => {
                let randomFunc = mulberry32(seed);
                let words = VOCABULARY_DB.filter(w => w.topic === topic);
                for (let i = words.length - 1; i > 0; i--) {
                    const j = Math.floor(randomFunc() * (i + 1));
                    [words[i], words[j]] = [words[j], words[i]];
                }
                return words;
            };

            const generateWords = (generationMode) => {
                // ========================================================
                // THUẬT TOÁN RANDOM MỚI: 5 TỪ KHÁC HOÀN TOÀN TỪ ĐANG CÓ TRÊN MÀN HÌNH
                // ========================================================
                if (generationMode === 'random') {
                    // 1. Lấy danh sách các từ hiện đang có trên màn hình
                    const currentDisplayedWords = dailyWords.map(item => item.word);
                    
                    // 2. Lọc ra danh sách từ mới (Bỏ qua các từ đang hiện trên màn hình)
                    let availableWords = VOCABULARY_DB.filter(w => !currentDisplayedWords.includes(w.word));
                    
                    // 3. Xáo trộn ngẫu nhiên toàn bộ danh sách vừa lọc
                    for (let i = availableWords.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [availableWords[i], availableWords[j]] = [availableWords[j], availableWords[i]];
                    }
                    
                    // 4. Bốc đúng 5 từ đầu tiên
                    setDailyWords(availableWords.slice(0, 5).map(w => ({ ...w, isReview: false })));
                    setMode('random');
                    return;
                }

                // ========================================================
                // THUẬT TOÁN DAILY: GIỮ NGUYÊN (THEO CHỦ ĐỀ VÀ ÔN TẬP)
                // ========================================================
                const today = new Date();
                const todaySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
                const randomToday = mulberry32(todaySeed);
                
                const todayTopicIdx = Math.floor(randomToday() * topics.length);
                const todayTopic = topics[todayTopicIdx];
                const shuffledToday = getWordsByTopicShuffled(todayTopic, todaySeed);

                const isReviewDay = today.getDate() % 2 === 0;

                if (!isReviewDay) {
                    setDailyWords(shuffledToday.slice(0, 5).map(w => ({ ...w, isReview: false })));
                } else {
                    const yesterday = new Date(today);
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdaySeed = yesterday.getFullYear() * 10000 + (yesterday.getMonth() + 1) * 100 + yesterday.getDate();
                    const randomYesterday = mulberry32(yesterdaySeed);
                    
                    const yesterdayTopicIdx = Math.floor(randomYesterday() * topics.length);
                    const yesterdayTopic = topics[yesterdayTopicIdx];
                    const shuffledYesterday = getWordsByTopicShuffled(yesterdayTopic, yesterdaySeed);
                    const yesterdayWords = shuffledYesterday.slice(0, 5);

                    const reviewIndex = todaySeed % 5; 
                    const reviewWord = { ...yesterdayWords[reviewIndex], isReview: true };

                    let newWords = [];
                    for (let w of shuffledToday) {
                        if (w.word !== reviewWord.word) {
                            newWords.push({ ...w, isReview: false });
                            if (newWords.length === 4) break;
                        }
                    }

                    let combined = [reviewWord, ...newWords];
                    const swapIdx = todaySeed % 5;
                    [combined[0], combined[swapIdx]] = [combined[swapIdx], combined[0]];

                    setDailyWords(combined);
                }
                setMode('daily');
            };

            const speakWord = (text) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.85; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Trình duyệt của bạn không hỗ trợ tính năng đọc âm thanh.");
                }
            };

            return (
                <div className="min-h-screen bg-sky-100 font-sans p-4 sm:p-8 flex justify-center">
                    <div className="max-w-3xl w-full">
                        
                        {/* Header */}
                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden mb-8 border-4 border-blue-400">
                            <div className="bg-blue-400 p-6 text-center">
                                <h1 className="text-3xl sm:text-4xl font-extrabold text-white drop-shadow-md flex flex-col sm:flex-row items-center justify-center gap-3">
                                    <Award className="hidden sm:block w-10 h-10 text-yellow-300" />
                                    <span>Học Từ Vựng Mỗi Ngày<br className="sm:hidden"/> cùng Dubai 2020</span>
                                    <Award className="hidden sm:block w-10 h-10 text-yellow-300" />
                                </h1>
                                <p className="text-blue-100 mt-3 text-lg font-medium">
                                    Mỗi ngày bé chép 5 từ ra vở để ghi nhớ thật giỏi nhé!
                                    <br/>
                                    <a href="https://fb.com/dubaity.ca" target="_blank" rel="noopener noreferrer" className="inline-block mt-1 text-yellow-200 hover:text-white hover:underline transition-colors">
                                        fb.com/dubaity.ca
                                    </a>
                                </p>
                            </div>
                        </div>

                        {/* Danh sách 5 từ */}
                        <div className="space-y-6">
                            {dailyWords.map((item, index) => {
                                return (
                                    <div 
                                        key={item.word + index} 
                                        className="bg-white rounded-3xl p-6 sm:p-8 shadow-md transition-all duration-300 border-b-8 border-r-8 border-gray-200 hover:border-blue-300 hover:-translate-y-1 relative overflow-hidden"
                                    >
                                        <div className="flex flex-col sm:flex-row gap-6 justify-between items-center relative z-10">
                                            
                                            {/* Cột thông tin từ vựng */}
                                            <div className="flex flex-col gap-4 w-full sm:w-2/3">
                                                
                                                <div className="flex flex-wrap items-center gap-4">
                                                    <div className="bg-orange-100 text-orange-600 font-bold text-xl rounded-full w-12 h-12 flex items-center justify-center border-2 border-orange-300 shrink-0">
                                                        {index + 1}
                                                    </div>
                                                    <h2 className="text-5xl font-black text-blue-600 tracking-wider">
                                                        {item.word}
                                                    </h2>
                                                    <button 
                                                        onClick={() => speakWord(item.word)}
                                                        className="bg-yellow-300 hover:bg-yellow-400 p-3 rounded-full shadow-sm transition-transform hover:scale-110 shrink-0"
                                                        title="Nghe phát âm"
                                                    >
                                                        <Volume2 className="w-6 h-6 text-yellow-800" />
                                                    </button>
                                                    
                                                    {item.isReview && (
                                                        <div className="ml-auto bg-green-100 text-green-700 border-2 border-green-300 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 shadow-sm">
                                                            <RefreshCw className="w-4 h-4" />
                                                            Từ ôn tập
                                                        </div>
                                                    )}
                                                </div>
                                                
                                                <div className="flex flex-wrap items-center gap-3 text-lg mt-2">
                                                    <span className="bg-gray-100 px-3 py-1 rounded-lg text-gray-700 font-mono font-medium tracking-wide border border-gray-200">
                                                        {item.phonetic}
                                                    </span>
                                                    <span className="text-gray-400 font-bold hidden sm:inline">•</span>
                                                    <span className="text-2xl font-bold text-pink-500">
                                                        {item.translation}
                                                    </span>
                                                </div>

                                                <div className="mt-4 bg-blue-50 p-4 rounded-xl border border-blue-100">
                                                    <p className="text-gray-800 font-medium text-lg">
                                                        🇬🇧 <span className="text-blue-700">{item.example}</span>
                                                    </p>
                                                    <p className="text-gray-600 mt-1">
                                                        🇻🇳 {item.exampleTrans}
                                                    </p>
                                                </div>

                                            </div>

                                            {/* Icon minh họa to */}
                                            <div className="hidden sm:flex w-1/3 justify-center items-center opacity-90 select-none drop-shadow-md transition-transform hover:scale-110">
                                                <span className="text-[120px] leading-none">
                                                    {item.emoji}
                                                </span>
                                            </div>
                                            
                                            {/* Icon mờ cho mobile */}
                                            <div className="absolute right-[-10px] bottom-[-20px] text-[150px] opacity-[0.07] sm:hidden pointer-events-none select-none">
                                                {item.emoji}
                                            </div>

                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Nút thao tác thêm */}
                        <div className="mt-10 flex flex-col sm:flex-row justify-center gap-4">
                            <button 
                                onClick={() => generateWords('daily')}
                                className={`px-6 py-4 rounded-2xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2 ${
                                    mode === 'daily' ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 hover:bg-blue-50'
                                }`}
                            >
                                <RefreshCw className="w-5 h-5" />
                                5 Từ Hôm Nay
                            </button>
                            
                            <button 
                                onClick={() => generateWords('random')}
                                className={`px-6 py-4 rounded-2xl font-bold text-lg shadow-md transition-all flex items-center justify-center gap-2 ${
                                    mode === 'random' ? 'bg-purple-600 text-white' : 'bg-white text-purple-600 hover:bg-purple-50'
                                }`}
                            >
                                <Sparkles className="w-5 h-5" />
                                Luyện tập từ khác
                            </button>
                        </div>

                        <div className="mt-8 mb-12 text-center text-gray-500 text-sm font-medium">
                            📝 Bé hãy chuẩn bị một cuốn vở thật đẹp để chép lại các từ vựng này nhé!
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VocabularyApp />);
    </script>
</body>
</html>
